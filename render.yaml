services:
  - type: web
    name: cg-scheduler-api
    runtime: node
    rootDir: api
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run migrate && npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: PGSSLMODE
        value: require
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PCO_APP_ID
        sync: false
      - key: PCO_SECRET
        sync: false
      - key: PCO_AUTH_TOKEN
        sync: false

  - type: web
    name: cg-scheduler
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
